version: 2

project_name: sshmgr

before:
  hooks:
    - go mod tidy

builds:
  - id: sshmgr
    main: .
    binary: sshmgr
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

changelog:
  use: git
  sort: asc

release:
  github:
    owner: uradical
    name: ssh-mgr
